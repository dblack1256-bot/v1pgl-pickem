<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1P Pick Em</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold-bg:rgba(255,215,0,.08);--silver:#C0C0C0;--bg:#080808;--s1:#111111;--s2:#1A1A1A;--b:#2A2A2A;--t:#FFFFFF;--dim:#888888;--danger:#FF4444;--ok:#3DDB7A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:'Montserrat',sans-serif;min-height:100vh;}
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:radial-gradient(ellipse at 50% 35%,#1c1500 0%,var(--bg) 65%);}
.spl-sub{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:16px;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.3);}
.spl-div{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.name-form{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;max-width:340px;}
.name-in{background:var(--s1);border:1px solid var(--b);border-radius:6px;color:var(--t);font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;padding:14px 20px;text-align:center;width:100%;outline:none;transition:border-color .2s;}
.name-in:focus{border-color:var(--gold);}
.name-in::placeholder{color:var(--dim);font-weight:400;}
.enter-btn{background:var(--gold);border:none;border-radius:4px;color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;padding:13px 60px;transition:opacity .2s;width:100%;}
.enter-btn:hover{opacity:.85;}
.spl-note{font-size:10px;color:var(--dim);letter-spacing:1px;max-width:300px;text-align:center;line-height:1.8;}
.spl-err{color:var(--danger);font-size:11px;min-height:14px;}
#app{display:none;}
.hdr{background:var(--s1);border-bottom:1px solid var(--b);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-brand span{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;color:var(--gold);}
.player-pill{background:var(--s2);border:1px solid var(--b);border-radius:20px;color:var(--t);font-size:12px;font-weight:700;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.p-dot{width:8px;height:8px;background:var(--ok);border-radius:50%;}
.tabs{background:var(--s1);border-bottom:1px solid var(--b);display:flex;padding:0 20px;}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;padding:14px 16px;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--t);}.tab.on{border-bottom-color:var(--gold);color:var(--gold);}
.main{max-width:900px;margin:0 auto;padding:24px 18px;}
.panel{display:none;}.panel.on{display:block;}
.wk-banner{background:linear-gradient(135deg,var(--s1) 0%,#1a1200 100%);border:1px solid var(--b);border-left:4px solid var(--gold);border-radius:8px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.wk-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:var(--gold);}
.wk-meta{font-size:10px;color:var(--dim);margin-top:3px;}
.prog-pill{background:var(--s2);border:1px solid var(--b);border-radius:20px;color:var(--t);font-size:11px;font-weight:800;padding:5px 13px;}
.prog-pill.done{border-color:var(--ok);color:var(--ok);}
.week-sel-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:22px;margin-bottom:18px;}
.clabel{font-size:10px;font-weight:800;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}
.week-opt{background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700;padding:14px 18px;transition:all .2s;margin-bottom:8px;}
.week-opt:hover{border-color:var(--gold);background:var(--gold-bg);}
.picks-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:560px){.picks-grid{grid-template-columns:1fr;}}
.pick-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;overflow:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pick-card{animation:fadeUp .3s ease both;}
.pick-card:nth-child(2){animation-delay:.05s}.pick-card:nth-child(3){animation-delay:.1s}.pick-card:nth-child(4){animation-delay:.15s}.pick-card:nth-child(5){animation-delay:.2s}.pick-card:nth-child(6){animation-delay:.25s}
.pick-hdr{background:var(--s2);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;}
.game-num{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.pick-made{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--ok);}
.pick-teams{display:flex;align-items:stretch;}
.team-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 10px;transition:background .15s;gap:5px;position:relative;}
.team-btn:hover{background:rgba(255,215,0,.04);}
.team-btn.picked{background:var(--gold-bg);}
.team-btn.picked::after{content:'';position:absolute;inset:0;border:2px solid var(--gold);pointer-events:none;}
.team-btn:first-child.picked::after{border-radius:0 0 0 8px;}
.team-btn:last-child.picked::after{border-radius:0 0 8px 0;}
.card-logo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--b);transition:border-color .15s;}
.team-btn.picked .card-logo{border-color:var(--gold);}
.card-logo-ph{width:56px;height:56px;border-radius:50%;background:var(--s2);border:2px solid var(--b);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--dim);transition:border-color .15s;}
.team-btn.picked .card-logo-ph{border-color:var(--gold);color:var(--gold);}
.team-abbr{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--t);transition:color .15s;line-height:1;}
.team-btn.picked .team-abbr{color:var(--gold);}
.team-nm{font-size:9px;font-weight:700;color:var(--dim);text-align:center;transition:color .15s;line-height:1.3;}
.team-btn.picked .team-nm{color:var(--t);}
.team-lbl{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:1px;}
.team-btn.picked .team-lbl{color:var(--gold);}
.vs-div{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px;}
.vs-div::before,.vs-div::after{content:'';flex:1;width:1px;background:var(--b);}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--dim);padding:5px 0;}
.pick-card.locked{opacity:.65;pointer-events:none;}
.tb-card{background:linear-gradient(135deg,#0d0d00 0%,var(--s1) 100%);border:1px solid var(--gold);border-radius:10px;padding:20px;margin-top:16px;animation:fadeUp .3s ease both;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:var(--gold);margin-bottom:4px;}
.tb-game{font-size:12px;color:var(--dim);margin-bottom:14px;}
.tb-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tb-input{background:var(--s2);border:2px solid var(--gold);border-radius:6px;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;padding:10px 18px;text-align:center;width:140px;outline:none;}
.tb-input::placeholder{color:rgba(255,215,0,.3);}
.tb-hint{font-size:11px;color:var(--dim);line-height:1.7;}
.submit-bar{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px 22px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.sub-btn{background:var(--gold);border:none;border-radius:4px;color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;padding:12px 44px;transition:opacity .2s;}
.sub-btn:hover{opacity:.85;}.sub-btn:disabled{opacity:.35;cursor:not-allowed;}
.sub-note{font-size:12px;color:var(--dim);line-height:1.6;}
.sub-note strong{color:var(--t);}
.saved-banner{background:rgba(61,219,122,.06);border:1px solid var(--ok);border-radius:8px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.saved-icon{font-size:24px;}
.saved-txt{font-size:12px;color:var(--ok);font-weight:700;}
.saved-sub{font-size:10px;color:var(--dim);margin-top:2px;font-weight:400;}
.board-card{background:var(--s1);border:1px solid var(--b);border-radius:8px;overflow:hidden;}
.board-tbl{width:100%;border-collapse:collapse;}
.board-tbl th{background:var(--s2);color:var(--dim);font-size:9px;font-weight:800;letter-spacing:2px;padding:9px 12px;text-align:left;text-transform:uppercase;}
.board-tbl td{padding:12px 12px;border-top:1px solid var(--b);font-size:13px;vertical-align:middle;}
.board-tbl tr:hover td{background:rgba(255,215,0,.025);}
.rank-1{color:var(--gold);}.rank-2{color:var(--silver);}.rank-3{color:#CD7F32;}
.you-row td{background:rgba(255,215,0,.04);}
.btn{border:none;border-radius:4px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.5px;padding:10px 18px;text-transform:uppercase;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn-ghost{background:var(--s2);border:1px solid var(--b);color:var(--t);}
.btn-sm{padding:6px 12px;font-size:10px;}
.empty{text-align:center;padding:48px 20px;color:var(--dim);}
.empty .ico{font-size:38px;margin-bottom:10px;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--b);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;right:22px;background:var(--s1);border:1px solid var(--gold);border-radius:6px;color:var(--t);font-size:12px;font-weight:700;padding:11px 16px;transform:translateY(70px);opacity:0;transition:all .3s;z-index:9999;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="splash">
  <div id="splashLogo"></div>
  <div class="spl-sub">PICK EM</div>
  <div class="spl-div"></div>
  <div style="font-size:10px;font-weight:800;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Enter Your Name</div>
  <div class="name-form">
    <input type="text" class="name-in" id="nameIn" placeholder="Your Discord name..." maxlength="30" onkeydown="if(event.key==='Enter')enterApp()">
    <button class="enter-btn" onclick="enterApp()">MAKE YOUR PICKS</button>
  </div>
  <div class="spl-err" id="splErr"></div>
  <div class="spl-note">Use your V1P Sports Universe Discord name.</div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div id="hdrLogo"></div>
      <span>PICK EM</span>
    </div>
    <div class="player-pill">
      <div class="p-dot"></div>
      <span id="playerDisp">-</span>
      <button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;padding:0;margin-left:2px" onclick="switchUser()">&#9998;</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab on" data-tab="picks" onclick="goTab('picks')">&#127944; Make Picks</button>
    <button class="tab"    data-tab="board" onclick="goTab('board')">&#127942; Leaderboard</button>
  </nav>
  <div class="main">
    <div class="panel on" id="panel-picks">
      <div id="picksContent"><div class="empty"><span class="spin"></span></div></div>
    </div>
    <div class="panel" id="panel-board">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:var(--gold);margin-bottom:6px">Season Standings</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:18px">Ranked by correct picks &middot; Ties broken by tiebreaker accuracy</div>
      <div id="boardContent"><div class="empty"><span class="spin"></span></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

// ââ STATE ââââââââââââââââââââââââââââââââââââââââââââââ
var playerName = '';
var allTeams   = [];
var allWeeks   = [];
var activeWeek = null;
var picks      = {};
var submitted  = false;

// ââ LOGO âââââââââââââââââââââââââââââââââââââââââââââââ
function injectLogos() {
  var tag = '<img src="data:image/png;base64,' + LOGO_B64 + '" style="width:140px;height:140px;object-fit:contain;mix-blend-mode:screen" alt="V1P">';
  var tagSm = '<img src="data:image/png;base64,' + LOGO_B64 + '" style="width:36px;height:36px;object-fit:contain;mix-blend-mode:screen" alt="V1P">';
  document.getElementById('splashLogo').innerHTML = tag;
  document.getElementById('hdrLogo').innerHTML = tagSm;
}

window.addEventListener('DOMContentLoaded', function() {
  injectLogos();
  var saved = localStorage.getItem('v1p_player_name');
  if (saved) document.getElementById('nameIn').value = saved;
});

// ââ AUTH âââââââââââââââââââââââââââââââââââââââââââââââ
function enterApp() {
  var name = document.getElementById('nameIn').value.trim();
  if (!name) { document.getElementById('nameIn').focus(); return; }
  if (!GAS_URL || GAS_URL === 'PASTE_GAS_URL_HERE') {
    document.getElementById('splErr').textContent = 'League not configured yet. Check back soon!';
    return;
  }
  playerName = name;
  localStorage.setItem('v1p_player_name', name);
  document.getElementById('playerDisp').textContent = name;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display    = 'block';
  loadPicksPanel();
}

function switchUser() {
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('app').style.display    = 'none';
  document.getElementById('nameIn').value = playerName;
  document.getElementById('splErr').textContent   = '';
}

// ââ GAS ââââââââââââââââââââââââââââââââââââââââââââââââ
function gasGet(action, params) {
  params = params || {};
  var q = GAS_URL + '?action=' + action;
  Object.keys(params).forEach(function(k) { q += '&' + k + '=' + encodeURIComponent(params[k]); });
  return fetch(q, {redirect:'follow'}).then(function(r){ return r.json(); });
}

function gasPost(action, data) {
  var blob = btoa(encodeURIComponent(JSON.stringify(data)));
  var q = GAS_URL + '?action=' + action + '&data=' + encodeURIComponent(blob);
  return fetch(q, {redirect:'follow'}).then(function(r){ return r.json(); });
}

// ââ PICKS PANEL ââââââââââââââââââââââââââââââââââââââââ
function loadPicksPanel() {
  setPC('<div class="empty"><span class="spin"></span></div>');
  gasGet('getConfig').then(function(cfg) {
    if (!cfg.ok) throw new Error(cfg.error || 'Failed to load');
    allTeams = cfg.teams || [];
    allWeeks = (cfg.weeks || []).filter(function(w){ return w.status !== 'archived'; });
    var open = allWeeks.filter(function(w){ return w.status === 'open' || w.status === 'locked'; });
    if (!open.length) { setPC('<div class="empty"><div class="ico">&#127944;</div><div>No active weeks right now. Check back soon!</div></div>'); return; }
    if (open.length === 1) activateWeek(open[0]);
    else showWeekSelector(open);
  }).catch(function(e) { setPC('<div class="empty"><div class="ico">&#9888;</div><div>Could not connect. ' + e.message + '</div></div>'); });
}

function showWeekSelector(weeks) {
  var opts = weeks.map(function(w) {
    var dl = w.deadline ? new Date(w.deadline).toLocaleString() : '';
    return '<div class="week-opt" onclick="chooseWeek(\'' + w.id + '\')">'
      + '<div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold)">' + w.name + '</div>'
      + '<div style="font-size:10px;color:var(--dim);margin-top:3px">' + (dl ? '&#9200; ' + dl : '') + ' &middot; ' + w.games.length + ' games</div></div>'
      + '<span style="color:var(--gold);font-size:18px">&#8250;</span></div>';
  }).join('');
  setPC('<div class="week-sel-card"><div class="clabel">Choose a Week</div>' + opts + '</div>');
}

function chooseWeek(id) {
  var w = allWeeks.find(function(w){ return w.id === id; });
  if (w) activateWeek(w);
}

function activateWeek(week) {
  activeWeek = week; picks = {}; submitted = false;
  gasGet('getEntry', {weekId: week.id, player: playerName}).then(function(r) {
    if (r.ok && r.entry && Object.keys(r.entry.picks || {}).length) {
      picks = r.entry.picks; submitted = true;
    }
    renderPicksView();
  }).catch(function(){ renderPicksView(); });
}

function renderPicksView() {
  if (!activeWeek) return;
  var locked  = activeWeek.status === 'locked' || submitted;
  var total   = activeWeek.games.length;
  var made    = Object.keys(picks).filter(function(k){ return k !== '__tb__'; }).length;
  var allDone = made >= total;
  var dl      = activeWeek.deadline ? '&#9200; Deadline: ' + new Date(activeWeek.deadline).toLocaleString() : activeWeek.games.length + ' games';
  var lastGame = activeWeek.games.length ? activeWeek.games[activeWeek.games.length - 1] : null;
  var hasTb   = picks.__tb__ !== undefined && picks.__tb__ !== '';

  var savedBanner = '';
  if (submitted) {
    var editBtn = (activeWeek.status !== 'locked') ? '<button class="btn btn-ghost btn-sm" onclick="editPicks()" style="margin-left:auto">&#9998; Edit</button>' : '';
    savedBanner = '<div class="saved-banner"><div class="saved-icon">&#9989;</div><div>'
      + '<div class="saved-txt">Picks saved!</div>'
      + '<div class="saved-sub">Your selections for ' + activeWeek.name + ' are locked in.' + (hasTb ? ' Tiebreaker: ' + picks.__tb__ + ' pts' : '') + '</div>'
      + '</div>' + editBtn + '</div>';
  }

  var grid = activeWeek.games.map(function(g, i) {
    var hp = picks[g.id] === 'home', ap = picks[g.id] === 'away';
    var isLast = i === activeWeek.games.length - 1 && activeWeek.games.length > 1;
    var pickBadge = picks[g.id] ? '<span class="pick-made">&#10003; ' + (picks[g.id]==='home'?g.home.abbr:g.away.abbr) + '</span>' : '';
    return '<div class="pick-card' + (locked ? ' locked' : '') + '">'
      + '<div class="pick-hdr"><span class="game-num">Game ' + (i+1) + (isLast ? ' &middot; TIEBREAKER GAME' : '') + '</span>' + pickBadge + '</div>'
      + '<div class="pick-teams">'
      + '<button class="team-btn' + (ap?' picked':'') + '" onclick="pick(\'' + g.id + '\',\'away\')" ' + (locked?'disabled':'') + '>'
      + logoEl(g.away.id, g.away.abbr)
      + '<div class="team-abbr">' + g.away.abbr + '</div>'
      + '<div class="team-nm">' + g.away.name + '</div>'
      + '<div class="team-lbl">Away</div></button>'
      + '<div class="vs-div"><span class="vs-text">@</span></div>'
      + '<button class="team-btn' + (hp?' picked':'') + '" onclick="pick(\'' + g.id + '\',\'home\')" ' + (locked?'disabled':'') + '>'
      + logoEl(g.home.id, g.home.abbr)
      + '<div class="team-abbr">' + g.home.abbr + '</div>'
      + '<div class="team-nm">' + g.home.name + '</div>'
      + '<div class="team-lbl">Home</div></button>'
      + '</div></div>';
  }).join('');

  var tbCard = '';
  if (allDone && !submitted && lastGame && activeWeek.games.length > 1) {
    tbCard = '<div class="tb-card">'
      + '<div class="tb-title">&#9889; Tiebreaker</div>'
      + '<div class="tb-game">Last game: <strong style="color:var(--t)">' + lastGame.away.name + ' @ ' + lastGame.home.name + '</strong> &mdash; guess combined total points</div>'
      + '<div class="tb-row"><input type="number" class="tb-input" id="tbInput" placeholder="0" min="0" max="300" value="' + (picks.__tb__ || '') + '" oninput="picks.__tb__=this.value">'
      + '<div class="tb-hint">Enter total points from both teams.<br>Closest guess breaks ties on the leaderboard.<br><span style="color:var(--gold)">Optional but encouraged!</span></div>'
      + '</div></div>';
  }

  var subBar = '';
  if (!submitted) {
    subBar = '<div class="submit-bar">'
      + '<div class="sub-note">Pick a winner for every game.<br><strong>' + made + ' of ' + total + '</strong> picks made.</div>'
      + '<button class="sub-btn" onclick="submitPicks()" ' + (allDone?'':'disabled') + '>LOCK IN PICKS</button>'
      + '</div>';
  }

  var backBtn = allWeeks.filter(function(w){ return w.status==='open'||w.status==='locked'; }).length > 1
    ? '<button class="btn btn-ghost btn-sm" onclick="loadPicksPanel()">&#8249; Back</button>' : '';

  setPC('<div class="wk-banner"><div><div class="wk-name">' + activeWeek.name + '</div><div class="wk-meta">' + dl + '</div></div>'
    + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="prog-pill' + (allDone?' done':'') + '">' + made + ' / ' + total + '</div>' + backBtn + '</div></div>'
    + savedBanner
    + '<div class="picks-grid">' + grid + '</div>'
    + tbCard + subBar);
}

function pick(gameId, side) {
  if (submitted) return;
  picks[gameId] = side;
  renderPicksView();
}

function submitPicks() {
  if (!activeWeek) return;
  var nonTb = Object.keys(picks).filter(function(k){ return k !== '__tb__'; });
  if (nonTb.length < activeWeek.games.length) return;
  var tbEl = document.getElementById('tbInput');
  if (tbEl) picks.__tb__ = tbEl.value || '';
  var entry = {weekId: activeWeek.id, playerName: playerName, picks: Object.assign({}, picks), timestamp: new Date().toISOString()};
  gasPost('saveEntry', entry).then(function(r) {
    if (!r.ok) throw new Error(r.error || 'Save failed');
    submitted = true;
    renderPicksView();
    toast('Picks locked in!', 'ok');
    // Fire Discord ping separately so a ping failure never blocks the save
    gasPost('pingPick', {playerName: playerName, weekId: activeWeek.id}).catch(function(){});
  }).catch(function(e){ toast('Error: ' + e.message, 'err'); });
}

function editPicks() {
  if (!confirm('Edit your picks? You will need to re-submit when done.')) return;
  submitted = false; renderPicksView();
}

// ââ LEADERBOARD ââââââââââââââââââââââââââââââââââââââââ
function loadBoard() {
  document.getElementById('boardContent').innerHTML = '<div class="empty"><span class="spin"></span></div>';
  gasGet('getLeaderboard').then(function(r) {
    if (!r.ok) throw new Error(r.error || 'Failed');
    renderBoard(r.board || [], r.ts);
  }).catch(function(e){ document.getElementById('boardContent').innerHTML = '<div class="empty"><div class="ico">&#9888;</div>' + e.message + '</div>'; });
}

function renderBoard(board, ts) {
  if (!board.length) {
    document.getElementById('boardContent').innerHTML = '<div class="empty"><div class="ico">&#127942;</div>No scored entries yet. Check back after games are scored!</div>';
    return;
  }
  var updated = ts ? 'Updated: ' + new Date(ts).toLocaleString() : '';
  var rows = board.map(function(p, i) {
    var r   = i + 1;
    var pct = p.possible > 0 ? Math.round(p.correct / p.possible * 100) : 0;
    var rc  = r <= 3 ? ' class="rank-' + r + '"' : '';
    var you = p.name.toLowerCase() === playerName.toLowerCase();
    var med = r===1?'&#129351;':r===2?'&#129352;':r===3?'&#129353;':r;
    var youBadge = you ? '<span style="background:var(--gold);color:#000;font-size:8px;font-weight:900;padding:2px 6px;border-radius:2px;margin-left:6px">YOU</span>' : '';
    var tbDisplay;
    if (p.exactCount > 0) {
      tbDisplay = '<span style="color:var(--gold);font-weight:900;font-size:10px">&#11088; EXACT x' + p.exactCount + '</span>';
    } else if (p.tbBest !== null && p.tbBest < 99999) {
      tbDisplay = '<span style="color:var(--ok)">-' + p.tbBest + ' pts</span>';
    } else if (p.tbBest !== null && p.tbBest >= 99999) {
      tbDisplay = '<span style="color:var(--danger);font-size:10px">BUSTED</span>';
    } else {
      tbDisplay = '<span style="color:var(--dim)">&mdash;</span>';
    }
    return '<tr' + (you?' class="you-row"':'') + '>'
      + '<td' + rc + ' style="font-family:\'Bebas Neue\',sans-serif;font-size:20px">' + med + '</td>'
      + '<td' + rc + ' style="font-weight:800">' + p.name + youBadge + '</td>'
      + '<td style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--gold)">' + p.correct + '</td>'
      + '<td style="color:var(--dim)">' + p.possible + '</td>'
      + '<td style="font-weight:700">' + pct + '%</td>'
      + '<td style="color:var(--silver)">' + p.best + '</td>'
      + '<td style="color:var(--dim)">' + p.weeks + '</td>'
      + '<td style="font-size:11px">' + tbDisplay + '</td>'
      + '</tr>';
  }).join('');
  document.getElementById('boardContent').innerHTML =
    '<div style="font-size:10px;color:var(--dim);margin-bottom:10px;text-align:right">' + updated + '</div>'
    + '<div class="board-card"><table class="board-tbl"><thead><tr>'
    + '<th>Rank</th><th>Player</th><th>Correct</th><th>Possible</th><th>Pct</th><th>Best</th><th>Weeks</th><th>TB &plusmn;</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

// ââ HELPERS ââââââââââââââââââââââââââââââââââââââââââââ
function logoEl(teamId, abbr) {
  var t = allTeams.find(function(t){ return t.id === teamId; });
  if (t && t.logo) return '<img src="data:image/jpeg;base64,' + t.logo + '" class="card-logo">';
  return '<div class="card-logo-ph">' + abbr + '</div>';
}

function setPC(html) { document.getElementById('picksContent').innerHTML = html; }

function goTab(name) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.toggle('on', b.dataset.tab === name); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.getElementById('panel-' + name).classList.add('on');
  if (name === 'board') loadBoard();
}

var _tt;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type==='err'?'var(--danger)':type==='ok'?'var(--ok)':'var(--gold)';
  el.classList.add('show'); clearTimeout(_tt); _tt = setTimeout(function(){ el.classList.remove('show'); }, 3200);
}
</script>
